# AutonomSOC — Kubernetes Deployment Manifests
# Apply: kubectl apply -f k8s/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: autonomsoc
  labels:
    app: autonomsoc

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: autonomsoc-config
  namespace: autonomsoc
data:
  OLLAMA_HOST:      "http://autonomsoc-ollama:11434"
  NEO4J_URI:        "bolt://autonomsoc-neo4j:7687"
  NEO4J_USER:       "neo4j"
  KAFKA_BOOTSTRAP:  "autonomsoc-kafka:29092"
  CHROMA_HOST:      "http://autonomsoc-chroma:8000"
  THEHIVE_URL:      "http://autonomsoc-thehive:9000"
  LOG_LEVEL:        "INFO"

---
# Secret (base64 encode values in production)
apiVersion: v1
kind: Secret
metadata:
  name: autonomsoc-secrets
  namespace: autonomsoc
type: Opaque
stringData:
  NEO4J_PASSWORD: "autonomsoc2026"
  THEHIVE_KEY:    "your-thehive-api-key"

---
# Agents Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomsoc-agents
  namespace: autonomsoc
  labels:
    app: autonomsoc-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonomsoc-agents
  template:
    metadata:
      labels:
        app: autonomsoc-agents
    spec:
      containers:
        - name: agents
          image: ghcr.io/your-org/autonomsoc-agents:IMAGE_TAG
          command: ["python", "kafka/kafka_consumer.py"]
          envFrom:
            - configMapRef:
                name: autonomsoc-config
            - secretRef:
                name: autonomsoc-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["python", "-c", "import confluent_kafka; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 60

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomsoc-api
  namespace: autonomsoc
  labels:
    app: autonomsoc-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonomsoc-api
  template:
    metadata:
      labels:
        app: autonomsoc-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/autonomsoc-agents:IMAGE_TAG
          command: ["uvicorn", "api.api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: autonomsoc-config
            - secretRef:
                name: autonomsoc-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

---
# Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomsoc-dashboard
  namespace: autonomsoc
  labels:
    app: autonomsoc-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonomsoc-dashboard
  template:
    metadata:
      labels:
        app: autonomsoc-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/your-org/autonomsoc-dashboard:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: autonomsoc-api
  namespace: autonomsoc
spec:
  selector:
    app: autonomsoc-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: autonomsoc-dashboard
  namespace: autonomsoc
spec:
  selector:
    app: autonomsoc-dashboard
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonomsoc-api-hpa
  namespace: autonomsoc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autonomsoc-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autonomsoc-ingress
  namespace: autonomsoc
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - autonomsoc.example.com
        - api.autonomsoc.example.com
      secretName: autonomsoc-tls
  rules:
    - host: autonomsoc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autonomsoc-dashboard
                port:
                  number: 80
    - host: api.autonomsoc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autonomsoc-api
                port:
                  number: 8000
